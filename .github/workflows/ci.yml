name: pysync CI/CD

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  test:
    name: Build & Test (${{ matrix.os }} - Python 3.14t No-GIL)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust Build Artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install uv (Python Package Manager)
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set Up Python 3.14 Free-Threaded (No-GIL)
        run: |
          uv python install 3.14t
          uv venv --python 3.14t

      - name: Install Build & Testing Dependencies
        run: |
          uv pip install maturin pytest mypy

      - name: Build PyO3 Extension via Maturin
        run: |
          uv run maturin develop

      - name: Run Fast Unit Tests (364 tests)
        run: |
          uv run pytest tests/ --verbose

      - name: Run Stress & Chaos Tests (24 tests)
        run: |
          uv run pytest tests_stress/ --verbose

      - name: Run Mypy Type Checking
        run: |
          uv run mypy --strict python/pysync/__init__.pyi
