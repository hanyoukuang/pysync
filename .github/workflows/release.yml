name: Release to PyPI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-wheels:
    name: Build Wheel (${{ matrix.os }} - Python 3.14t Free-Threaded)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install uv (Python Package Manager)
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set Up Python 3.14t (Free-Threaded No-GIL)
        run: |
          uv python install 3.14t
          uv venv --python 3.14t

      - name: Install Maturin Build Tool
        run: |
          uv pip install maturin

      - name: Build Free-Threaded Wheel via Maturin
        run: |
          uv run maturin build --release --out dist

      - name: Upload Wheels as Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist/*.whl

  publish:
    name: Publish Free-Threaded Wheels to PyPI
    runs-on: ubuntu-latest
    needs: [build-wheels]
    permissions:
      id-token: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - name: Install uv (Python Package Manager)
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set Up Python & Maturin for Publish
        run: |
          uv python install 3.14t
          uv venv --python 3.14t
          uv pip install maturin

      - name: Publish Wheels to PyPI
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.MATURIN_PYPI_TOKEN }}
        run: |
          uv run maturin upload --non-interactive dist/*
