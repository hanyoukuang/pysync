name: Release to PyPI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-wheels:
    name: Build Wheels (${{ matrix.target }} - Python 3.14t Free-Threaded)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 & ARM64 (aarch64)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu

          # macOS Apple Silicon (ARM64) & Intel (x86_64)
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin

          # Windows x86_64 & ARM64 (aarch64)
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: windows-latest
            target: aarch64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - name: Install uv (Python Package Manager)
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set Up Python 3.14t (Free-Threaded No-GIL)
        run: |
          uv python install 3.14t
          uv venv --python 3.14t

      - name: Build Free-Threaded Wheels (cp314t) via Maturin Action
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          container: off
          args: --release --out dist

      - name: Upload Wheels as Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist/*.whl

  publish:
    name: Publish Free-Threaded Wheels to PyPI
    runs-on: ubuntu-latest
    needs: [build-wheels]
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - name: Publish to PyPI
        uses: PyO3/maturin-action@v1
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.MATURIN_PYPI_TOKEN }}
        with:
          command: upload
          args: --non-interactive dist/*
